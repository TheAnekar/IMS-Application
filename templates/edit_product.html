<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS | Edit-Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    {% include 'includes/navbar.html' %}
    {% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }} alert-dismissible fade show">

                {{ message }}

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}

    {% endif %}

{% endwith %}

    <div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">
                        Edit Product
                    </h4>

                </div>

                <div class="card-body">

    <form action="/update/{{ product[0] }}" method="POST">

        <label>Name:</label>
        <input type="text" name="name" class="form-control" value="{{ product[1] }}" required>
        <br><br>

        <label>Category:</label>
        <input type="text" name="category" class="form-control" value="{{ product[2] }}" required>
        <br><br>

        <label>Price:</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ product[3] }}" required>
        <br><br>

        <label>Quantity:</label>
        <input type="number" name="quantity" class="form-control" value="{{ product[4] }}" required>
        <br><br>

        <button type="submit" class="btn btn-success">
            Update Product
        </button>

    </form>
                </div>

            </div>

        </div>

    </div>

</div>

    <script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>

</html>
